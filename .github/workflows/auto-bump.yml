# Auto-bump: poll upstream Releases and open a same-repo PR when a new
# `peeroxide-cli-v*` GitHub Release is available.
#
# Authentication model:
#   - Uses ONLY the per-run `GITHUB_TOKEN`. No PAT, no GitHub App, no
#     long-lived secrets. The token is minted fresh by GitHub for this run
#     and discarded when the job ends.
#   - Same-repo PR creation requires the repo setting:
#       Settings -> Actions -> General ->
#         Workflow permissions: Read and write
#         "Allow GitHub Actions to create and approve pull requests": ON
#     This is a one-time, non-rotating repo setting.
#
# CI on the resulting PR:
#   - PRs opened by `GITHUB_TOKEN` do NOT trigger `pull_request` workflow
#     runs by default. `ci.yml` is configured to also trigger on `push` to
#     `auto-bump/**`, which fires regardless of token identity. The push
#     event creates the check, which is then linked to the PR by SHA.
#
# Auto-merge on the resulting PR:
#   - For the same `GITHUB_TOKEN` suppression reason, a `pull_request_target`
#     listener would never fire here. Instead, the final step of this
#     workflow dispatches `auto-merge.yml` (a `workflow_dispatch` trigger
#     is one of the two suppression exceptions, alongside
#     `repository_dispatch`) and passes the new PR number. That workflow
#     re-verifies the PR's safety properties and runs `gh pr merge --auto`.
name: auto-bump

on:
  schedule:
    # Daily at 06:17 UTC. Offset off-the-hour to spread Actions load.
    - cron: "17 6 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to bump to (e.g. 0.2.0). Leave blank to auto-discover the latest peeroxide-cli release."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  # Required so the final step can dispatch `auto-merge.yml` via
  # `gh workflow run`, which calls POST /actions/workflows/{id}/dispatches.
  actions: write

concurrency:
  group: auto-bump
  cancel-in-progress: false

jobs:
  bump:
    name: Bump formula to latest peeroxide-cli release
    runs-on: ubuntu-latest
    steps:
      - name: Check out tap
        uses: actions/checkout@v5

      - name: Discover target version
        id: target
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_VERSION:-}" ]; then
            VERSION="$INPUT_VERSION"
            echo "Using version from workflow input: $VERSION"
          else
            # List up to 50 releases and pick the newest tag matching the
            # strict `peeroxide-cli-vMAJOR.MINOR.PATCH` shape, sorted by
            # createdAt. We can't use `/releases/latest` because that flag
            # tracks the most recent release across ALL crates in the
            # workspace (peeroxide, peeroxide-dht, libudx, peeroxide-cli),
            # so it migrates off the CLI whenever a library is published.
            # The regex anchors out any prerelease form like
            # `peeroxide-cli-v0.2.0-rc.1` so they're skipped rather than
            # mis-ranked.
            VERSION=$(
              gh release list \
                --repo Rightbracket/peeroxide \
                --limit 50 \
                --json tagName,createdAt \
                --jq '[.[] | select(.tagName | test("^peeroxide-cli-v[0-9]+\\.[0-9]+\\.[0-9]+$"))]
                       | sort_by(.createdAt) | last | .tagName // empty
                       | sub("^peeroxide-cli-v"; "")'
            )
            if [ -z "$VERSION" ]; then
              echo "No peeroxide-cli-v* releases found upstream; nothing to do."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Discovered latest upstream peeroxide-cli version: $VERSION"
          fi

          # The formula does not carry an explicit `version` line (it would
          # be redundant with the version Homebrew parses from the URL). We
          # therefore read the current version out of the first url line.
          CURRENT=$(grep -Eo 'peeroxide-cli-v[0-9]+(\.[0-9]+)+' Formula/peeroxide.rb | head -n1 | sed 's/^peeroxide-cli-v//')
          echo "Current formula version: $CURRENT"

          if [ "$VERSION" = "$CURRENT" ]; then
            echo "Formula already at $VERSION; no bump needed."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "version=$VERSION"            >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT"            >> "$GITHUB_OUTPUT"
          echo "tag=peeroxide-cli-v$VERSION" >> "$GITHUB_OUTPUT"
          echo "skip=false"                  >> "$GITHUB_OUTPUT"

      - name: Download SHA256 sidecars
        if: steps.target.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.target.outputs.tag }}
          VERSION: ${{ steps.target.outputs.version }}
        run: |
          set -euo pipefail

          # The release tag (created by release-plz) and the binary
          # archives (built by Rightbracket/peeroxide's binary-release.yml
          # on the tag push) are produced by separate workflows, so when
          # we arrive here the tag may exist before its assets do. Upstream
          # builds typically complete in well under three minutes; we poll
          # for up to ten before declaring a real failure. A genuine
          # upstream breakage will surface as a hard failure (and a daily
          # nag from the cron), which is the signal we want.
          DEADLINE=$(( $(date +%s) + 600 ))
          ATTEMPT=0
          MAC="_shas/peeroxide-${VERSION}-universal-apple-darwin.tar.gz.sha256"
          ARM="_shas/peeroxide-${VERSION}-aarch64-unknown-linux-gnu.tar.gz.sha256"
          X86="_shas/peeroxide-${VERSION}-x86_64-unknown-linux-gnu.tar.gz.sha256"

          while :; do
            ATTEMPT=$((ATTEMPT + 1))
            # Clean slate each attempt: `gh release download` refuses to
            # overwrite, and we don't want a partial publish from a prior
            # attempt to mask a still-missing sidecar.
            rm -rf _shas
            mkdir -p _shas

            if gh release download "$TAG" \
                  --repo Rightbracket/peeroxide \
                  --pattern '*.sha256' \
                  --dir _shas 2>/dev/null \
               && [ -f "$MAC" ] && [ -f "$ARM" ] && [ -f "$X86" ]; then
              echo "All three sidecars present after attempt ${ATTEMPT}."
              ls -1 _shas
              break
            fi

            if [ "$(date +%s)" -ge "$DEADLINE" ]; then
              echo "ERROR: tag $TAG exists but its .sha256 sidecars never published within 10 minutes." >&2
              echo "  This usually means upstream binary-release.yml failed for this tag." >&2
              echo "  Investigate: https://github.com/Rightbracket/peeroxide/actions" >&2
              echo "  Sidecars seen so far:" >&2
              ls -la _shas >&2 || true
              exit 1
            fi

            echo "Sidecars not all present yet (attempt ${ATTEMPT}); sleeping 30s..."
            sleep 30
          done

      - name: Parse SHA256s
        if: steps.target.outputs.skip != 'true'
        id: shas
        env:
          VERSION: ${{ steps.target.outputs.version }}
        run: |
          set -euo pipefail
          # Sidecar format: `<sha256>  <filename>`
          extract() {
            local triple="$1"
            local file="_shas/peeroxide-${VERSION}-${triple}.tar.gz.sha256"
            if [ ! -f "$file" ]; then
              echo "ERROR: missing sidecar $file" >&2
              exit 1
            fi
            awk '{print $1}' "$file"
          }

          MAC_UNIVERSAL=$(extract universal-apple-darwin)
          LINUX_ARM=$(extract aarch64-unknown-linux-gnu)
          LINUX_X86=$(extract x86_64-unknown-linux-gnu)

          # Sanity-check each is a 64-char hex string.
          for sha in "$MAC_UNIVERSAL" "$LINUX_ARM" "$LINUX_X86"; do
            if ! [[ "$sha" =~ ^[0-9a-f]{64}$ ]]; then
              echo "ERROR: invalid sha256 value: $sha" >&2
              exit 1
            fi
          done

          echo "mac_universal=$MAC_UNIVERSAL" >> "$GITHUB_OUTPUT"
          echo "linux_arm=$LINUX_ARM"         >> "$GITHUB_OUTPUT"
          echo "linux_x86=$LINUX_X86"         >> "$GITHUB_OUTPUT"

      - name: Rewrite Formula/peeroxide.rb
        if: steps.target.outputs.skip != 'true'
        env:
          OLD_VERSION: ${{ steps.target.outputs.current }}
          NEW_VERSION: ${{ steps.target.outputs.version }}
          SHA_MAC_UNIVERSAL: ${{ steps.shas.outputs.mac_universal }}
          SHA_LINUX_ARM: ${{ steps.shas.outputs.linux_arm }}
          SHA_LINUX_X86: ${{ steps.shas.outputs.linux_x86 }}
        run: |
          python3 - <<'PY'
          import os, re, sys, pathlib

          path = pathlib.Path("Formula/peeroxide.rb")
          text = path.read_text()

          old_version = os.environ["OLD_VERSION"]
          new_version = os.environ["NEW_VERSION"]
          triples = (
              "universal-apple-darwin",
              "aarch64-unknown-linux-gnu",
              "x86_64-unknown-linux-gnu",
          )
          shas = {
              "universal-apple-darwin":    os.environ["SHA_MAC_UNIVERSAL"],
              "aarch64-unknown-linux-gnu": os.environ["SHA_LINUX_ARM"],
              "x86_64-unknown-linux-gnu":  os.environ["SHA_LINUX_X86"],
          }

          # 1) Rewrite the upstream release-path version. Anchored on the
          #    full prefix `peeroxide-cli-v` so we never touch a comment
          #    that happens to contain a bare version number.
          text = text.replace(
              f"peeroxide-cli-v{old_version}",
              f"peeroxide-cli-v{new_version}",
          )

          # 2) Rewrite each asset filename, anchored on its target triple
          #    suffix. This is stricter than a bare `peeroxide-<old>`
          #    replace (which could rewrite unrelated text in comments)
          #    and stricter than a global version replace (which would
          #    eat literally any occurrence of the old version string).
          for triple in triples:
              old = f"peeroxide-{old_version}-{triple}"
              new = f"peeroxide-{new_version}-{triple}"
              if old not in text:
                  sys.exit(f"Expected to find asset filename `{old}` in formula but did not")
              text = text.replace(old, new)

          # 3) Replace the sha256 line for each triple. The trailing
          #    `# <triple>` comment is the anchor; do not remove it from
          #    the formula or this step will silently no-op.
          for triple, sha in shas.items():
              pattern = re.compile(
                  r'(sha256\s+)"[0-9a-f]{64}"(\s*#\s*' + re.escape(triple) + r'\s*)$',
                  re.MULTILINE,
              )
              text, n = pattern.subn(rf'\g<1>"{sha}"\g<2>', text, count=1)
              if n != 1:
                  sys.exit(f"Failed to find/replace sha256 line for triple {triple}")

          # 4) Defensive: confirm no stale, version-bearing references
          #    remain. Anchored on the same prefixes we rewrote above so
          #    substring-version collisions (e.g. 0.1.0 -> 0.1.10, where
          #    "0.1.0" is a substring of "0.1.10") do not produce false
          #    positives.
          stale_markers = [f"peeroxide-cli-v{old_version}"] + [
              f"peeroxide-{old_version}-{t}" for t in triples
          ]
          for marker in stale_markers:
              if marker in text:
                  sys.exit(f"Stale reference `{marker}` still present after rewrite")

          path.write_text(text)
          print(f"Rewrote Formula/peeroxide.rb: {old_version} -> {new_version}")
          PY

      - name: Show diff
        if: steps.target.outputs.skip != 'true'
        run: git --no-pager diff Formula/peeroxide.rb

      - name: Create / update bump PR
        id: cpr
        if: steps.target.outputs.skip != 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          branch: auto-bump/peeroxide-cli-v${{ steps.target.outputs.version }}
          delete-branch: true
          add-paths: Formula/peeroxide.rb
          commit-message: |
            peeroxide ${{ steps.target.outputs.version }}

            Bumps the formula to consume binaries from upstream release
            ${{ steps.target.outputs.tag }}.
          title: "peeroxide ${{ steps.target.outputs.version }}"
          body: |
            Automated bump to `peeroxide-cli-v${{ steps.target.outputs.version }}`.

            **Upstream release:** https://github.com/Rightbracket/peeroxide/releases/tag/${{ steps.target.outputs.tag }}

            ### SHA256s (from the release's `.sha256` sidecars)

            | Target                      | SHA256 |
            | --------------------------- | ------ |
            | `universal-apple-darwin`    | `${{ steps.shas.outputs.mac_universal }}` |
            | `aarch64-unknown-linux-gnu` | `${{ steps.shas.outputs.linux_arm }}` |
            | `x86_64-unknown-linux-gnu`  | `${{ steps.shas.outputs.linux_x86 }}` |

            Generated by `.github/workflows/auto-bump.yml`. CI runs against the
            `auto-bump/peeroxide-cli-v${{ steps.target.outputs.version }}` branch push.
          labels: auto-bump

      - name: Dispatch auto-merge.yml
        # Fires whenever an open bump PR exists for the branch (i.e. the
        # create-pull-request action emitted a number), covering both the
        # `created` and `updated` operations. `workflow_dispatch` is one
        # of the two trigger types not suppressed by `GITHUB_TOKEN`
        # authorship, which is the whole reason we go through this
        # indirection rather than relying on `pull_request_target` in
        # `auto-merge.yml`.
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          set -euo pipefail
          gh workflow run auto-merge.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.ref_name }}" \
            -f pr_number="$PR_NUMBER"
