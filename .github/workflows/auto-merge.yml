# Auto-merge: enable squash auto-merge on a bump PR once it has been
# created and labeled. Invoked exclusively via `workflow_dispatch` from
# `auto-bump.yml` (and optionally manually for ad-hoc recovery).
#
# Why workflow_dispatch instead of pull_request_target?
#   GitHub deliberately suppresses workflow runs for events triggered by
#   `GITHUB_TOKEN`, with `workflow_dispatch` and `repository_dispatch` as
#   the only exceptions. Since `auto-bump.yml` opens the PR using its own
#   `GITHUB_TOKEN`, a `pull_request_target` listener never fires; the
#   `opened`/`labeled` events get dropped on the floor. Dispatching this
#   workflow explicitly sidesteps the suppression.
#
# Safety properties (re-verified at run time, not trusted from the input):
#   - PR must be OPEN.
#   - PR must come from this repo (no forks).
#   - PR must carry the `auto-bump` label.
#   - PR must modify nothing outside `Formula/peeroxide.rb`.
#
# To disable temporarily without touching the file, remove the `auto-bump`
# label from the PR; the next dispatch will refuse to merge it.
name: auto-merge

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to enable auto-merge on"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    name: Enable auto-merge on auto-bump PR
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR and enable auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Fetch everything we need in a single API round-trip. We do not
          # trust the dispatcher's claim that this is the right PR; we
          # re-verify each safety property below.
          DATA=$(gh pr view "$PR_NUMBER" --repo "$REPO" \
            --json state,labels,headRepository,headRepositoryOwner,files)

          STATE=$(echo "$DATA" | jq -r '.state')
          if [ "$STATE" != "OPEN" ]; then
            echo "Refusing: PR #$PR_NUMBER is not OPEN (state=$STATE)." >&2
            exit 1
          fi

          # Same-repo PR (no forks). headRepository is null for PRs whose
          # head repo has been deleted; treat that as a hard refusal.
          HEAD_OWNER=$(echo "$DATA" | jq -r '.headRepositoryOwner.login // ""')
          HEAD_NAME=$(echo "$DATA" | jq -r '.headRepository.name // ""')
          HEAD_FULL="$HEAD_OWNER/$HEAD_NAME"
          if [ "$HEAD_FULL" != "$REPO" ]; then
            echo "Refusing: PR #$PR_NUMBER head ($HEAD_FULL) is not this repo ($REPO)." >&2
            exit 1
          fi

          # Must carry the `auto-bump` label.
          if ! echo "$DATA" | jq -e '.labels[] | select(.name == "auto-bump")' >/dev/null; then
            echo "Refusing: PR #$PR_NUMBER does not have the 'auto-bump' label." >&2
            exit 1
          fi

          # Only Formula/peeroxide.rb may be modified.
          OFFENDING=$(echo "$DATA" | jq -r '.files[].path' | grep -vx 'Formula/peeroxide.rb' || true)
          if [ -n "$OFFENDING" ]; then
            echo "Refusing: PR #$PR_NUMBER touches files outside Formula/peeroxide.rb:" >&2
            echo "$OFFENDING" >&2
            exit 1
          fi

          echo "All safety checks passed for PR #$PR_NUMBER; enabling auto-merge."
          gh pr merge "$PR_NUMBER" --repo "$REPO" --auto --squash
