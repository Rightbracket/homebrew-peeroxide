# Tap CI: lint the formula and install it from prebuilt binaries on every
# supported platform.
#
# Trigger model:
#   - `pull_request` runs CI on user-authored PRs (review flow).
#   - `push` runs CI on the bump branches that `auto-bump.yml` creates.
#     This is required because PRs opened by `GITHUB_TOKEN` do NOT fire
#     `pull_request` workflow runs; the `push` event fires regardless of
#     token identity, and the resulting check is linked to the PR by SHA.
#   - `push` on `main` runs post-merge sanity checks.
#   - `workflow_dispatch` for manual reruns.
name: tap CI

on:
  push:
    branches:
      - main
      - "auto-bump/**"
    paths:
      - "Formula/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "Formula/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint formula
    runs-on: ubuntu-latest
    steps:
      - name: Check out tap
        uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Register checkout as a Homebrew tap
        # `brew style`/`audit`/`install` no longer accept loose file paths;
        # the formula must be reachable through a tap. We symlink the
        # workspace into Homebrew's taps directory so commands can address
        # the formula as `rightbracket/peeroxide/peeroxide`.
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/rightbracket/homebrew-peeroxide"
          mkdir -p "$(dirname "$TAP_DIR")"
          ln -s "$GITHUB_WORKSPACE" "$TAP_DIR"

      - name: brew style
        run: brew style rightbracket/peeroxide/peeroxide

      - name: brew audit
        # `--online` validates that every URL in the formula resolves and
        # that the recorded SHA256s match. This is cheap (three small
        # tarballs) and gives us a strong signal that auto-bump produced
        # a coherent formula before we ever try to install it.
        run: brew audit --strict --online --formula rightbracket/peeroxide/peeroxide

  install:
    name: brew install (${{ matrix.os }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        # Matrix rationale:
        #   - macos-15        : Apple Silicon runner. The macOS archive is
        #                       a `lipo`'d universal binary, so the Intel
        #                       slice is the same bytes shipped here; we
        #                       trust upstream's lipo and skip a dedicated
        #                       Intel runner (macos-13/14 queue times are
        #                       prohibitively slow).
        #   - ubuntu-latest   : Linux x86_64 archive.
        #   - ubuntu-24.04-arm: Linux aarch64 archive. GitHub's free ARM
        #                       runners (public repos, since Jan 2025)
        #                       give us coverage that previously only
        #                       existed in theory through `brew audit`.
        os: [macos-15, ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out tap
        uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Register checkout as a Homebrew tap
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/rightbracket/homebrew-peeroxide"
          mkdir -p "$(dirname "$TAP_DIR")"
          ln -s "$GITHUB_WORKSPACE" "$TAP_DIR"

      - name: brew install peeroxide
        run: brew install --verbose rightbracket/peeroxide/peeroxide

      - name: brew test peeroxide
        run: brew test peeroxide
